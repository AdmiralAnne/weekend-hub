<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Tapes</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <header class="top-bar widget" style="margin-bottom: 20px;">
            <h2 style="margin-bottom: 0;">// COMMUNITY ARCHIVE</h2>
            <a href="index.html" id="back-to-deck-btn" class="text-btn" style="text-decoration: none;">[ <- BACK TO DECK ]</a>
        </header>

        <div id="loading-msg" style="font-size: 2rem; text-align: center; margin-top: 50px;">
            Fetching tapes from the cloud...
        </div>

        <div class="widget" style="margin-bottom: 20px; padding: 15px 25px;">
            <h3 style="color: var(--accent); margin-bottom: 10px; font-size: 1.6rem; border-bottom: 1px dashed var(--border); padding-bottom: 5px;">// PLATFORM_STATS</h3>
            <div id="global-stats" style="display: flex; justify-content: space-between; text-align: center; font-size: 1.8rem;">
                <div><span style="color: var(--accent);">TAPES:</span> <span id="stat-tapes">0</span></div>
                <div><span style="color: var(--accent);">TRACKS:</span> <span id="stat-tracks">0</span></div>
                <div><span style="color: var(--accent);">LIKES:</span> <span id="stat-likes">0</span></div>
                <div><span style="color: var(--accent);">PLAYS:</span> <span id="stat-plays">0</span></div>
            </div>
        </div>

        <div id="tape-grid" class="explore-grid"></div>

    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content widget">
            
            <h2 style="margin-bottom: 20px;">// RE-BURN TAPE</h2>
            
            <label>Tape Name</label>
            <input type="text" id="edit-tape-title" placeholder="e.g., Midnight Drive">
            
            <label>Tracklist (YouTube Links, 1 per line)</label>
            <textarea id="edit-tape-links" placeholder="https://youtube.com/...&#10;https://youtube.com/..."></textarea>
            
            <div class="modal-actions">
                <button id="cancel-edit-btn" class="outline-btn">CANCEL</button>
                <button id="save-edit-btn" class="filled-btn">SAVE CHANGES</button>
            </div>
            
        </div>
    </div>
    <script type="module" src="js/explore.js"></script>
</body>
</html>
